<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список книг библиотеки</title>
    <link rel="stylesheet" href="css/freemarker.css">
</head>
<body>
    <div class="container">
        <h1>Список книг</h1>
        <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
            <tr style="background-color: #eee;">
                <th>Название</th>
                <th>Автор</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <#list books as book>
                <tr>
                    <td><a href="/book?id=${book.id}">${book.title}</a></td>
                    <td>${book.author}</td>
                    <td>
                        <#if book.borrowed>
                            <span style="color: red;">Выдана</span>
                        <#if book.currentHolder??>
                        (сотруднику <a href="/employee?id=${book.currentHolder.id}">${book.currentHolder.name}</a>)
                        </#if>
                        <#else>
                        <span style="color: green;">Доступна</span>
                        </#if>
                    </td>
                </tr>
            </#list>
            </tbody>
        </table>
    </div>
</body>
</html>
